<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator game</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <!-- Calculator -->

    <!-- HTML NOTES FOR MEG SELV: <input type="number" id="calcInput" placeholder="Enter a number">
<button id="actionButton">Process Data</button> -->
    <div id="calculator">
      <input id="display" readonly />
      <div id="keys">
        <button onclick="appendToDisplay('+')" class="operator-btn">+</button>
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('9')">9</button>
        <button onclick="appendToDisplay('-')" class="operator-btn">-</button>
        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>
        <button onclick="appendToDisplay('*')" class="operator-btn">*</button>
        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>
        <button onclick="appendToDisplay('/')" class="operator-btn">/</button>
        <button onclick="appendToDisplay('0')">0</button>
        <button onclick="appendToDisplay('.')">.</button>
        <button onclick="calculate()">=</button>
        <button onclick="clearDisplay()" class="operator-btn">C</button>
      </div>
    </div>

    <!-- TIMER -->
    <div id="timer">
      <h1 class="h1-timer">Timer</h1>
      <div id="timer-container">
        <div id="timer-display">00:00:00:00</div>
        <div id="timer-controls">
          <button id="startBtn" onclick="start()">Start</button>
          <button id="stopBtn" onclick="stop()">Stop</button>
          <button id="resetBtn" onclick="reset()">Reset</button>
        </div>
      </div>
    </div>
  </body>
</html>
