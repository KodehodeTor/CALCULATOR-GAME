<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator game</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page">
      <h1 class="h1-calculator">CALCULATOR GAME</h1>
      <!-- CALCULATOR -->
      <div id="calculator">
        <input id="display" readonly />
        <div id="keys">
          <button onclick="appendToDisplay('+')" class="operator-btn">+</button>
          <button onclick="appendToDisplay('7')">7</button>
          <button onclick="appendToDisplay('8')">8</button>
          <button onclick="appendToDisplay('9')">9</button>
          <button onclick="appendToDisplay('-')" class="operator-btn">-</button>
          <button onclick="appendToDisplay('4')">4</button>
          <button onclick="appendToDisplay('5')">5</button>
          <button onclick="appendToDisplay('6')">6</button>
          <button onclick="appendToDisplay('*')" class="operator-btn">*</button>
          <button onclick="appendToDisplay('1')">1</button>
          <button onclick="appendToDisplay('2')">2</button>
          <button onclick="appendToDisplay('3')">3</button>
          <button onclick="appendToDisplay('/')" class="operator-btn">/</button>
          <button onclick="appendToDisplay('0')">0</button>
          <button onclick="appendToDisplay('.')">.</button>
          <button onclick="calculate()">=</button>
          <button onclick="clearDisplay()" class="operator-btn">C</button>
        </div>
      </div>
    </div>

    <!-- TIMER & RNG -->
    <div id="timer">
      <!-- RNG - GENERATOR -->
      <div class="generator-container">
        <h2 class="h2-rng">Random Number Generator</h2>
        <div id="number-display" class="display-box">#######</div>
        <button id="generate-btn">Start game!</button>
      </div>
      <h1 class="h1-timer">Timer</h1>
      <div id="timer-container">
        <div id="timer-display">00:00:00:00</div>
        <div id="timer-controls">
          <button id="startBtn" onclick="start()">Start</button>
          <button id="stopBtn" onclick="stop()">Stop</button>
          <button id="resetBtn" onclick="reset()">Reset</button>
        </div>
      </div>

      <h2 class="h2-timer">How to play:</h2>
      <p class="p-timer">
        Press "Start game!" <br /><br />You have to calculate the randomly
        generated number in the calculator by using all the operators. <br />
        <br />
        Good luck!
      </p>
    </div>

    <!-- INSERT HIGHSCORE LIST HERE -->
  </body>
</html>
